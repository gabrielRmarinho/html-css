<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxo Perfumes</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
font-size:28px;
letter-spacing:2px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.produto{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
text-align:center;
}

.produto img{
width:100%;
height:250px;
object-fit:cover;
border-radius:8px;
}

.produto h3{
margin:10px 0;
}

.preco{
color:#27ae60;
font-size:20px;
font-weight:bold;
}

.botao{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#000;
color:white;
text-decoration:none;
border-radius:5px;
}

.botao:hover{
background:#444;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}
</style>

</head>

<body>

<header>
Luxo Perfumes
</header>

<div class="container">

<h2>Perfumes em Destaque</h2>

<div class="produtos">

<div class="produto">
<img src="https://images.unsplash.com/photo-1594035910387-fea47794261f">
<h3>Perfume Elegance</h3>
<p class="preco">R$ 199,90</p>
<a class="botao" href="https://www.chanel.com/br/perfumes/mulheres/c/7x1x1x43/coco/" target="_blank" rel="external">Comprar</a>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd">
<h3>Perfume Royal</h3>
<p class="preco">R$ 249,90</p>
<a class="botao" href="https://www.chanel.com/br/perfumes/mulheres/c/7x1x1x43/coco/">Comprar</a>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
<h3>Perfume Gold</h3>
<p class="preco">R$ 299,90</p>
<a class="botao" href="https://wa.me/SEUNUMERO">Comprar</a>
</div>

</div>

</div>

<footer>
© 2026 Luxo Perfumes - Todos os direitos reservados
</footer>

</body>
</html>
